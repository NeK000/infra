---
common_packages:
  - tmux
  - btop
  - curl
  - htop
  - ca-certificates

timezone: Europe/Copenhagen

##### Compose stack defaults
compose_stack_host_name: "{{ inventory_hostname_short }}"
compose_stack_base_dir: "/opt/{{ compose_stack_host_name }}"
compose_stack_name: "{{ compose_stack_host_name }}"
compose_stack_project_name: "{{ compose_stack_name }}"
compose_stack_dest_dir: "{{ compose_stack_base_dir }}"
compose_stack_template_modes:
  ".env": "0640"

##### Static network settings
IP_NAS: "10.50.10.2"
IP_PBS: "10.50.10.3"
IP_PVE2: "10.50.10.10"
IP_EDGE: "10.50.10.210"
IP_TESLAMATE: "10.50.10.211"
IP_DNS: "10.50.10.212"
IP_MONITORING: "10.50.10.213"
IP_AIML: "10.50.10.214"
IP_TOWER: "10.10.1.20"
IP_FAT_LADY: "10.10.1.20"
IP_HOMEASSISTANT: "10.10.1.31"

##### Variables provided by Doppler
EDGE_TAILSCALE_AUTHKEY: "{{ lookup('ansible.builtin.env', 'EDGE_TAILSCALE_AUTHKEY') | default(undef('Missing env var: EDGE_TAILSCALE_AUTHKEY'), true) }}"
###Adguard
ADGUARD_USERNAME: "{{ lookup('ansible.builtin.env', 'ADGUARD_USERNAME') | default(undef('Missing env var: ADGUARD_USERNAME'), true) }}"
ADGUARD_PASSWORD: "{{ lookup('ansible.builtin.env', 'ADGUARD_PASSWORD') | default(undef('Missing env var: ADGUARD_PASSWORD'), true) }}"
###Unifi
UNIFI_URL: "{{ lookup('ansible.builtin.env', 'UNIFI_URL') | default('', true) }}"
UNIFI_API_KEY: "{{ lookup('ansible.builtin.env', 'UNIFI_API_KEY') | default('', true) }}"
###Unraid
UNRAID_URL: "{{ lookup('ansible.builtin.env', 'UNRAID_URL') | default('', true) }}"
UNRAID_API_KEY: "{{ lookup('ansible.builtin.env', 'UNRAID_API_KEY') | default('', true) }}"
UNRAID_POOL1: "{{ lookup('ansible.builtin.env', 'UNRAID_POOL1') | default('', true) }}"
###Proxmox Backup Server
PBS_URL: "{{ lookup('ansible.builtin.env', 'PBS_URL') | default('', true) }}"
PBS_USERNAME: "{{ lookup('ansible.builtin.env', 'PBS_USERNAME') | default('', true) }}"
PBS_PASSWORD: "{{ lookup('ansible.builtin.env', 'PBS_PASSWORD') | default('', true) }}"
###Proxmox  PVE 2
PVE2_URL: "{{ lookup('ansible.builtin.env', 'PVE2_URL') | default('', true) }}"
PVE2_USERNAME: "{{ lookup('ansible.builtin.env', 'PVE2_USERNAME') | default('', true) }}"
PVE2_PASSWORD: "{{ lookup('ansible.builtin.env', 'PVE2_PASSWORD') | default('', true) }}"
###Home Assistant
HOME_ASSISTANT_URL: "{{ lookup('ansible.builtin.env', 'HOME_ASSISTANT_URL') | default('', true) }}"
HOME_ASSISTANT_ACCESS_TOKEN: "{{ lookup('ansible.builtin.env', 'HOME_ASSISTANT_ACCESS_TOKEN') | default('', true) }}"
###Immich
IMMICH_API_KEY: "{{ lookup('ansible.builtin.env', 'IMMICH_API_KEY') | default('', true) }}"
IMMICH_DB_PASSWORD: "{{ lookup('ansible.builtin.env', 'IMMICH_DB_PASSWORD') | default(undef('Missing env var: IMMICH_DB_PASSWORD'), true) }}"
###Teslamate
TESLAMATE_ENCRYPTION_KEY: "{{ lookup('ansible.builtin.env', 'TESLAMATE_ENCRYPTION_KEY') | default(undef('Missing env var: TESLAMATE_ENCRYPTION_KEY'), true) }}"
TESLAMATE_GRAFANA_USER: "{{ lookup('ansible.builtin.env', 'TESLAMATE_GRAFANA_USER') | default(undef('Missing env var: TESLAMATE_GRAFANA_USER'), true) }}"
TESLAMATE_GRAFANA_PASSWORD: "{{ lookup('ansible.builtin.env', 'TESLAMATE_GRAFANA_PASSWORD') | default(undef('Missing env var: TESLAMATE_GRAFANA_PASSWORD'), true) }}"
TESLAMATE_ABRP_KEY: "{{ lookup('ansible.builtin.env', 'TESLAMATE_ABRP_KEY') | default(undef('Missing env var: TESLAMATE_ABRP_KEY'), true) }}"
TESLAMATE_ABRP_CAR_NUMBER: "{{ lookup('ansible.builtin.env', 'TESLAMATE_ABRP_CAR_NUMBER') | default(undef('Missing env var: TESLAMATE_ABRP_CAR_NUMBER'), true) }}"
TESLAMATE_ABRP_CAR_MODEL: "{{ lookup('ansible.builtin.env', 'TESLAMATE_ABRP_CAR_MODEL') | default(undef('Missing env var: TESLAMATE_ABRP_CAR_MODEL'), true) }}"

TESLAMATE_PG_USER: "{{ lookup('ansible.builtin.env', 'TESLAMATE_PG_USER') | default('teslamate', true) }}"
TESLAMATE_PG_PASS: "{{ lookup('ansible.builtin.env', 'TESLAMATE_PG_PASS') | default(undef('Missing env var: TESLAMATE_PG_PASS'), true) }}"
TESLAMATE_PG_DB: "{{ lookup('ansible.builtin.env', 'TESLAMATE_PG_DB') | default('teslamate', true) }}"
TESLAMATE_PGBACKREST_RETENTION_FULL: "{{ lookup('ansible.builtin.env', 'TESLAMATE_PGBACKREST_RETENTION_FULL') | default('7', true) }}"
TESLAMATE_PGBACKREST_FULL_BACKUP_INTERVAL_SECONDS: "{{ lookup('ansible.builtin.env', 'TESLAMATE_PGBACKREST_FULL_BACKUP_INTERVAL_SECONDS') | default('86400', true) }}"

MQTT_HOST: "{{ lookup('ansible.builtin.env', 'MQTT_HOST') | default(undef('Missing env var: MQTT_HOST'), true) }}"
MQTT_USERNAME: "{{ lookup('ansible.builtin.env', 'MQTT_USERNAME') | default(undef('Missing env var: MQTT_USERNAME'), true) }}"
MQTT_PASSWORD: "{{ lookup('ansible.builtin.env', 'MQTT_PASSWORD') | default(undef('Missing env var: MQTT_PASSWORD'), true) }}"
