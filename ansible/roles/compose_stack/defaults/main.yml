---
compose_stack_name: ""
compose_stack_project_name: "{{ compose_stack_name }}"
compose_stack_dest_dir: ""
compose_stack_repo_root: "{{ role_path | dirname | dirname }}"
compose_stack_local_service_dir: "{{ compose_stack_repo_root }}/services/{{ compose_stack_name }}"
compose_stack_local_files_dir: "{{ compose_stack_local_service_dir }}/files"
compose_stack_local_templates_dir: "{{ compose_stack_local_service_dir }}/templates"

compose_stack_compose_files:
  - docker-compose.yml

compose_stack_extra_directories: []
compose_stack_directories: "{{ compose_stack_extra_directories }}"
compose_stack_directory_specs: []
compose_stack_managed_files: []
compose_stack_secret_files: []
compose_stack_owner: root
compose_stack_group: root
compose_stack_directory_mode: "0755"
compose_stack_static_files_mode: preserve
compose_stack_managed_file_default_mode: "0644"
compose_stack_secret_directory_mode: "0700"
compose_stack_secret_file_default_mode: "0600"
compose_stack_template_modes: {}
compose_stack_template_default_mode: "0644"

compose_stack_pull_policy: missing
compose_stack_wait_timeout: 120
