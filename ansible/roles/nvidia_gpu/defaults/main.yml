---
nvidia_gpu_driver_version: "550.163.01"
nvidia_gpu_container_name: ollama
nvidia_gpu_ollama_image: ollama/ollama
nvidia_gpu_cuda_validation_image: nvidia/cuda:12.4.1-base-ubuntu22.04
nvidia_gpu_container_toolkit_packages:
  - nvidia-container-toolkit
nvidia_gpu_container_toolkit_key_url: https://nvidia.github.io/libnvidia-container/gpgkey
nvidia_gpu_container_toolkit_key_ascii_path: /usr/share/keyrings/nvidia-container-toolkit-keyring.asc
nvidia_gpu_container_toolkit_keyring_path: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
nvidia_gpu_container_toolkit_repo_path: /etc/apt/sources.list.d/nvidia-container-toolkit.list
nvidia_gpu_configure_docker_runtime: true
nvidia_gpu_disable_container_runtime_cgroups: true
nvidia_gpu_validation_driver_capabilities: compute,utility
