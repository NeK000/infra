---
- name: Purge conflicting NVIDIA guest packages
  ansible.builtin.shell: |
    set -o pipefail
    packages="$(
      dpkg-query -W -f='${binary:Package}\n' 'nvidia-*' 'libnvidia-*' 2>/dev/null \
        | sed 's/:.*//' \
        | sort -u \
        | grep -Ev '^(nvidia-container-toolkit|nvidia-container-toolkit-base|libnvidia-container1|libnvidia-container-tools)$' || true
    )"
    if [ -z "$packages" ]; then
      echo "No conflicting NVIDIA guest packages installed"
      exit 0
    fi
    echo "Purging conflicting NVIDIA guest packages: $packages"
    apt-get purge -y $packages
  args:
    executable: /bin/bash
  register: nvidia_gpu_purge
  changed_when: "'Purging conflicting NVIDIA guest packages' in nvidia_gpu_purge.stdout"

- name: Autoremove packages after NVIDIA purge
  ansible.builtin.apt:
    autoremove: true
    purge: true
  register: nvidia_gpu_autoremove

- name: Install NVIDIA Container Toolkit prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gpg
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Check NVIDIA host bind mounts from Terraform
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /dev/nvidia0
    - /dev/nvidiactl
    - /dev/nvidia-uvm
    - /dev/nvidia-uvm-tools
    - /dev/nvidia-caps
    - /usr/bin/nvidia-smi
    - "/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.{{ nvidia_gpu_driver_version }}"
    - "/usr/lib/x86_64-linux-gnu/libcuda.so.{{ nvidia_gpu_driver_version }}"
  register: nvidia_gpu_bind_mounts

- name: Fail when NVIDIA host bind mounts are missing
  ansible.builtin.fail:
    msg: >-
      Missing NVIDIA host bind mounts inside this LXC: {{
      nvidia_gpu_bind_mounts.results
      | rejectattr('stat.exists')
      | map(attribute='item')
      | list
      }}. Run Terraform for aiml, then stop/start CT 214 so Proxmox applies
      the raw LXC device and library passthrough. Do not install Ubuntu
      nvidia-utils or libnvidia packages in the guest.
  when: nvidia_gpu_bind_mounts.results | rejectattr('stat.exists') | list | length > 0

- name: Validate NVIDIA device nodes from LXC passthrough
  ansible.builtin.command:
    argv:
      - test
      - -c
      - "{{ item }}"
  loop:
    - /dev/nvidia0
    - /dev/nvidiactl
    - /dev/nvidia-uvm
    - /dev/nvidia-uvm-tools
  changed_when: false

- name: Ensure NVIDIA library directory exists
  ansible.builtin.file:
    path: /usr/lib/x86_64-linux-gnu
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create NVIDIA userspace library symlinks
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
    follow: false
  loop:
    - src: "/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.{{ nvidia_gpu_driver_version }}"
      dest: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
    - src: "/usr/lib/x86_64-linux-gnu/libcuda.so.{{ nvidia_gpu_driver_version }}"
      dest: /usr/lib/x86_64-linux-gnu/libcuda.so.1
    - src: /usr/lib/x86_64-linux-gnu/libcuda.so.1
      dest: /usr/lib/x86_64-linux-gnu/libcuda.so

- name: Refresh dynamic linker cache
  ansible.builtin.command:
    cmd: ldconfig
  changed_when: false

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download NVIDIA Container Toolkit repository key
  ansible.builtin.get_url:
    url: "{{ nvidia_gpu_container_toolkit_key_url }}"
    dest: "{{ nvidia_gpu_container_toolkit_key_ascii_path }}"
    mode: "0644"
  register: nvidia_gpu_container_toolkit_key

- name: Check NVIDIA Container Toolkit keyring
  ansible.builtin.stat:
    path: "{{ nvidia_gpu_container_toolkit_keyring_path }}"
  register: nvidia_gpu_container_toolkit_keyring

- name: Install NVIDIA Container Toolkit repository keyring
  ansible.builtin.command:
    cmd: "gpg --yes --dearmor -o {{ nvidia_gpu_container_toolkit_keyring_path }} {{ nvidia_gpu_container_toolkit_key_ascii_path }}"
  when: nvidia_gpu_container_toolkit_key.changed or not nvidia_gpu_container_toolkit_keyring.stat.exists

- name: Configure NVIDIA Container Toolkit apt repository
  ansible.builtin.copy:
    dest: "{{ nvidia_gpu_container_toolkit_repo_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [signed-by={{ nvidia_gpu_container_toolkit_keyring_path }}] https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: "{{ nvidia_gpu_container_toolkit_packages }}"
    state: present
    update_cache: true

- name: Check NVIDIA runtime cgroup management setting
  ansible.builtin.shell: |
    set -o pipefail
    grep -Eq '^[[:space:]]*no-cgroups[[:space:]]*=[[:space:]]*true[[:space:]]*$' /etc/nvidia-container-runtime/config.toml
  args:
    executable: /bin/bash
  register: nvidia_gpu_no_cgroups
  changed_when: false
  failed_when: false
  when: nvidia_gpu_disable_container_runtime_cgroups | bool

- name: Disable NVIDIA runtime cgroup management in LXC
  ansible.builtin.command:
    argv:
      - nvidia-ctk
      - config
      - --set
      - nvidia-container-cli.no-cgroups=true
      - --in-place
  notify: Restart docker
  when:
    - nvidia_gpu_disable_container_runtime_cgroups | bool
    - nvidia_gpu_no_cgroups.rc != 0

- name: Install Python Docker module dependencies
  ansible.builtin.apt:
    name:
      - python3-docker
      - python3-requests
    state: present

- name: Check Docker runtimes before NVIDIA configuration
  ansible.builtin.command:
    cmd: docker info --format '{{ "{{" }}json .Runtimes{{ "}}" }}'
  register: nvidia_gpu_docker_runtimes_before
  changed_when: false
  failed_when: false
  when: nvidia_gpu_configure_docker_runtime | bool

- name: Configure NVIDIA runtime for Docker
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --runtime=docker
  register: nvidia_gpu_docker_runtime
  changed_when: true
  notify: Restart docker
  when:
    - nvidia_gpu_configure_docker_runtime | bool
    - nvidia_gpu_docker_runtimes_before.rc != 0 or '"nvidia"' not in nvidia_gpu_docker_runtimes_before.stdout

- name: Flush NVIDIA GPU handlers
  ansible.builtin.meta: flush_handlers

- name: Validate NVIDIA userspace visibility
  ansible.builtin.command:
    cmd: /usr/bin/nvidia-smi
  register: nvidia_gpu_smi
  changed_when: false

- name: Validate Docker runtimes
  ansible.builtin.shell: |
    set -o pipefail
    docker info | grep -i -A8 runtimes
  args:
    executable: /bin/bash
  register: nvidia_gpu_docker_info
  changed_when: false

- name: Validate NVIDIA runtime with CUDA container
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - --runtime=nvidia
      - --device
      - /dev/nvidia0:/dev/nvidia0
      - --device
      - /dev/nvidiactl:/dev/nvidiactl
      - --device
      - /dev/nvidia-modeset:/dev/nvidia-modeset
      - --device
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - --device
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
      - -e
      - NVIDIA_VISIBLE_DEVICES=all
      - -e
      - "NVIDIA_DRIVER_CAPABILITIES={{ nvidia_gpu_validation_driver_capabilities }}"
      - "{{ nvidia_gpu_cuda_validation_image }}"
      - nvidia-smi
  register: nvidia_gpu_cuda_validation
  changed_when: false

- name: Validate NVIDIA CUDA devices and libraries in Docker
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - --runtime=nvidia
      - --device
      - /dev/nvidia0:/dev/nvidia0
      - --device
      - /dev/nvidiactl:/dev/nvidiactl
      - --device
      - /dev/nvidia-modeset:/dev/nvidia-modeset
      - --device
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - --device
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
      - -e
      - NVIDIA_VISIBLE_DEVICES=all
      - -e
      - "NVIDIA_DRIVER_CAPABILITIES={{ nvidia_gpu_validation_driver_capabilities }}"
      - "{{ nvidia_gpu_cuda_validation_image }}"
      - bash
      - -lc
      - |
        set -eu
        missing=0
        for path in /dev/nvidia0 /dev/nvidiactl /dev/nvidia-uvm; do
          if [ ! -e "$path" ]; then
            echo "missing device: $path"
            missing=1
          fi
        done
        if ! ldconfig -p | grep -q libcuda.so.1; then
          echo "missing linker entry: libcuda.so.1"
          missing=1
        fi
        if ! ldconfig -p | grep -q libnvidia-ml.so.1; then
          echo "missing linker entry: libnvidia-ml.so.1"
          missing=1
        fi
        if [ "$missing" -ne 0 ]; then
          echo "NVIDIA devices visible:"
          ls -l /dev/nvidia* /dev/nvidia-caps/* 2>/dev/null || true
          echo "NVIDIA linker entries visible:"
          ldconfig -p | grep -E 'libcuda|libnvidia-ml' || true
          exit 1
        fi
  register: nvidia_gpu_cuda_device_validation
  changed_when: false
