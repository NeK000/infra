---
  - hosts: aiml
    roles:
      - role: packages
      - role: geerlingguy.docker
      - role: nvidia_gpu
      - role: compose_stack
        tags:
          - compose
    tasks:
      - name: Validate Ollama container sees NVIDIA runtime
        ansible.builtin.command:
          argv:
            - docker
            - compose
            - -p
            - "{{ compose_stack_project_name }}"
            - -f
            - "{{ compose_stack_dest_dir }}/docker-compose.yml"
            - exec
            - -T
            - ollama
            - bash
            - -lc
            - >-
              test -e /dev/nvidia0 &&
              test -e /dev/nvidiactl &&
              test -e /dev/nvidia-uvm &&
              ldconfig -p | grep -q libcuda.so.1 &&
              ldconfig -p | grep -q libnvidia-ml.so.1 &&
              nvidia-smi
        changed_when: false
        tags:
          - compose
          - nvidia

      - name: Validate Ollama discovered CUDA GPU
        ansible.builtin.shell: |
          set -o pipefail
          docker logs --since 5m {{ compose_stack_project_name }}-ollama-1 2>&1 \
            | grep -Ei 'inference compute.*library=(cuda|cuda_v[0-9]+)'
        args:
          executable: /bin/bash
        changed_when: false
        tags:
          - compose
          - nvidia

  - hosts: edge
    roles:
      - role: packages
      - role: geerlingguy.docker
      - role: compose_stack
        tags:
          - compose

  - hosts: dns
    roles:
      - role: packages
      - role: geerlingguy.docker
      - role: dns_host_prepare
      - role: compose_stack
        tags:
          - compose
      - role: adguard_config
        tags:
          - dns_rewrites

  - hosts: monitoring
    roles:
      - role: packages
      - role: geerlingguy.docker
      - role: compose_stack
        tags:
          - compose

  - hosts: teslamate
    roles:
      - role: packages
      - role: geerlingguy.docker
      - role: compose_stack
        tags:
          - compose

  - hosts: nextcloud
    roles:
      - role: packages
      - role: geerlingguy.docker
      - role: compose_stack
        tags:
          - compose
