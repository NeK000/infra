---
services:
  immich-db:
    image: tensorchord/pgvecto-rs:pg16-v0.3.0
    restart: unless-stopped
    networks:
      - aiml-stack
    environment:
      TZ: ${TIMEZONE}
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
    volumes:
      - ./immich/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d immich
      interval: 10s
      timeout: 5s
      retries: 5

  immich-redis:
    image: redis:8.6.1
    restart: unless-stopped
    networks:
      - aiml-stack
    environment:
      TZ: ${TIMEZONE}
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  immich:
    image: ghcr.io/imagegenius/immich:2.7.5
    restart: unless-stopped
    runtime: nvidia
    networks:
      - aiml-stack
    ports:
      - "8080:8080"
    environment:
      TZ: ${TIMEZONE}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      DB_HOSTNAME: immich-db
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
      REDIS_PORT: "6379"
      MACHINE_LEARNING_HOST: 0.0.0.0
      MACHINE_LEARNING_PORT: "3003"
      MACHINE_LEARNING_WORKERS: "1"
      MACHINE_LEARNING_WORKER_TIMEOUT: "120"
      PUID: "1000"
      PGID: "1000"
      UMASK: "022"
    volumes:
      - ./immich/photos:/photos
      - ./immich/libraries:/libraries
      - ./immich/config:/config
    depends_on:
      immich-db:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    labels:
      homepage.group: Services
      homepage.name: Immich
      homepage.href: http://immich.ninik.lab/
      homepage.description: Photo and video library
      homepage.widget.type: immich
      homepage.widget.url: http://dns.ninik.lab/
      homepage.widget.key: ${IMMICH_API_KEY}
      homepage.widget.version: 2
      tsdproxy.enable: "true"
      tsdproxy.name: immich
      tsdproxy.container_port: "8080"
      tsdproxy.ephemeral: "true"

  aiml-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.1
    restart: unless-stopped
    ports:
      - "2375:2375"
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      IMAGES: "1"
      INFO: "1"
      NETWORKS: "1"
      PING: "1"
      POST: "0"
      SERVICES: "0"
      TASKS: "0"
      VERSION: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  aiml-stack:
    name: aiml-stack
